# Tomcat
server:
  port: 9200

# Spring
spring:
  application:
    # 应用名称
    name: ruoyi-auth
  profiles:
    # 环境配置
    active: dev
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: 192.168.11.106:8848
        namespace: public    # <--- 必须加这一行！！！
      #        username: nacos
      #        password: nacos
      config:
        # 配置中心地址
        server-addr: 192.168.11.106:8848
        namespace: public    # <--- 必须加这一行！！！
  #        username: nacos
  #        password: nacos
  config:
    # 配置文件格式
    file-extension: yml
    import:
      - optional:nacos:application-${spring.profiles.active}.${spring.config.file-extension}
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.config.file-extension}
logging:
  level:
    com.alibaba.nacos.client.config.impl: WARN
    com.alibaba.nacos: WARN