# Tomcat
server:
  port: 8080

# Spring
spring:
  application:
    # 应用名称
    name: ruoyi-gateway
  profiles:
    # 环境配置
    active: dev
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: 192.168.11.106:8848
      #        namespace: public    # <--- 必须加这一行！！！
      #        username: nacos
      #        password: nacos
      config:
        # 配置中心地址
        server-addr: 192.168.11.106:8848
    #        namespace: public    # <--- 必须加这一行！！！
    #        group: DEFAULT_GROUP # <--- 推荐加上
    #        file-extension: yml
    #        username: nacos
    #        password: nacos
    sentinel:
      # 取消控制台懒加载
      eager: true
      transport:
        # 控制台地址
        dashboard: 127.0.0.1:8718
      # nacos配置持久化
      datasource:
        ds1:
          nacos:
            server-addr: 192.168.11.106:8848
            namespace: public    # <--- 必须加这一行！！！
            dataId: sentinel-ruoyi-gateway
            groupId: DEFAULT_GROUP
            data-type: json
            rule-type: gw-flow
  config:
    # 配置文件格式
    file-extension: yml
    import:
      - optional:nacos:application-${spring.profiles.active}.${spring.config.file-extension}
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.config.file-extension}
logging:
  level:
    com.alibaba.nacos.client.config.impl: WARN
    com.alibaba.nacos: WARN
